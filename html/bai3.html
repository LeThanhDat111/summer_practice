<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="../css/style.css">
    </head>
    <body>
        <div class="container">
            <header>
                <h2 class="txt-title">Máy tính</h2>
            </header>
            <main>
                <div class="dropdowns">
                    <button id="btn" class="btn_dropdown horver_btn-dropdown">
                        Phép tính
                        <img src="../img/down-arrow.png" alt="" class="img_dropdowns">
                    </button>
                    <ul id="menu" class="menu_dropdown">
                        <li id="cong" class="item-dropdown horver_items-dropdown horver_item_dropdown" style="padding-top: 3px;">Cộng</li>
                        <li id="tru" class="item-dropdown horver_items-dropdown horver_item_dropdown">Trừ</li>
                        <li id="nhan" class="item-dropdown horver_items-dropdown horver_item_dropdown">Nhân</li>
                        <li id="chia" class="item-dropdown horver_items-dropdown horver_item_dropdown">Chia</li>
                    </ul>
                </div>
                <div class="horization">
                    <div class="box_txt_input">
                        <h3 class="txt-input">Nhập số a:</h3>
                    </div>
                    <div class="">
                        <input type="text" class="ip" id="Num_a">
                    </div>
                </div>
                <span id="err_a" class="err"></span>
                <span id="phep_tinh" class="pheptinh"></span>
                <div class="horization" style="margin-top: 10px;">
                    <div class="box_txt_input">
                        <h3 class="txt-input">Nhập số b:</h3>
                    </div>
                    <div>
                        <input type="text" class="ip" id="Num_b">
                    </div>
                </div>
                <span id="err_b" class="err"></span>
                <div class="horization">
                    <div class="box_txt_input">
                        <h3 class="txt-input">Kết quả:</h3>
                    </div>
                    <div>
                        <input
                            type="text"
                            class="ip"
                            disabled
                            id="finally"
                        >
                    </div>
                </div>
            </main>
            <footer>
                <h3 class="txt-des">By Lê Thành Đạt &copy; @Right 2026</h3>
            </footer>
        </div>
        <script src="../js/main.js"></script>
    </body>
</html>
